name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-formulae:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@fb0fe15d936a80ac0ba4c6cee691bc3da3f00f4e

      - name: Tap current repository
        shell: bash
        run: |
          set -euxo pipefail
          brew tap --custom-remote techwizrd/tap "${GITHUB_WORKSPACE}"

      - name: Style and audit formulae
        shell: bash
        run: |
          set -euxo pipefail
          shopt -s nullglob
          formulae=(Formula/*.rb)
          if [[ ${#formulae[@]} -eq 0 ]]; then
            exit 0
          fi

          brew style Formula/*.rb
          for formula_path in "${formulae[@]}"; do
            formula_name="$(basename "${formula_path}" .rb)"
            brew audit --strict --online --formula "techwizrd/tap/${formula_name}"
          done

      - name: Build and test formulae
        shell: bash
        run: |
          set -euxo pipefail
          shopt -s nullglob
          formulae=(Formula/*.rb)
          if [[ ${#formulae[@]} -eq 0 ]]; then
            exit 0
          fi

          for formula_path in "${formulae[@]}"; do
            formula_name="$(basename "${formula_path}" .rb)"
            brew install --build-from-source "techwizrd/tap/${formula_name}"
            brew test "techwizrd/tap/${formula_name}"
            brew uninstall --force "techwizrd/tap/${formula_name}"
          done
