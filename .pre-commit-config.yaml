repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.8
    hooks:
      - id: actionlint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args: ["--disable", "MD013"]

  - repo: local
    hooks:
      - id: github-actions-macos-bash-compat
        name: GitHub Actions macOS Bash compatibility
        entry: >-
          bash -c 'set -euo pipefail; if grep -RInE "\b(mapfile|readarray)\b" .github/workflows --include "*.yml" --include "*.yaml"; then printf "%s\n" "GitHub macOS runners use Bash 3.2 for shell: bash; avoid mapfile/readarray in workflows."; exit 1; fi'
        language: system
        pass_filenames: false

      - id: brew-style
        name: brew style Formula
        entry: bash -c 'set -euo pipefail; brew_bin="$(command -v brew || true)"; if [[ -z "$brew_bin" ]]; then brew_bin="/home/linuxbrew/.linuxbrew/bin/brew"; fi; "$brew_bin" style Formula/*.rb'
        language: system
        pass_filenames: false

      - id: brew-audit
        name: brew audit Formula
        entry: bash -c 'set -euo pipefail; brew_bin="$(command -v brew || true)"; if [[ -z "$brew_bin" ]]; then brew_bin="/home/linuxbrew/.linuxbrew/bin/brew"; fi; shopt -s nullglob; files=(Formula/*.rb); if [[ ${#files[@]} -eq 0 ]]; then exit 0; fi; if ! "$brew_bin" --repo techwizrd/local >/dev/null 2>&1; then "$brew_bin" tap-new --no-git techwizrd/local >/dev/null; fi; tap_repo="$("$brew_bin" --repo techwizrd/local)"; mkdir -p "$tap_repo/Formula"; rm -f "$tap_repo/Formula"/*.rb; cp Formula/*.rb "$tap_repo/Formula"/; for f in "${files[@]}"; do formula_name="$(basename "$f" .rb)"; "$brew_bin" audit --strict --online --formula "techwizrd/local/${formula_name}"; done'
        language: system
        pass_filenames: false
